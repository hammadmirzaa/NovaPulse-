name: Deploy Worker

on:
  push:
    branches: [ main ]
    paths:
      - 'worker-service/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'
    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'
    - name: 'Configure Docker'
      run: |
        gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev
    - name: 'Build and Push'
      run: |
        docker build worker-service -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/novapulse/worker:${{ github.sha }}
        docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/novapulse/worker:${{ github.sha }}
    - name: 'GKE Credentials'
      uses: 'google-github-actions/get-gke-credentials@v2'
      with:
        cluster_name: 'notification-cluster'
        location: '${{ secrets.GCP_REGION }}'
    - name: 'Kubectl Apply'
      run: |
        cd worker-service/k8s
        sed -i 's|gcr.io/novapulse-dev/notification-worker:latest|${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/novapulse/worker:${{ github.sha }}|g' deployment.yaml
        kubectl apply -f configmap.yaml
        kubectl apply -f deployment.yaml
        kubectl apply -f service.yaml
